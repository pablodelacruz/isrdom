version: "3.8"

services:
  isr-calculator:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: isr-calculator-app
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.isr-calculator.rule=Host(`localhost`)"
      - "traefik.http.services.isr-calculator.loadbalancer.server.port=80"

  # Optional: Development service
  isr-calculator-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: isr-calculator-dev
    ports:
      - "3001:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    profiles:
      - dev
